name: COM Debug Collector

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-com-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Collect COM debug data
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          COM_MAX_PAGES: "7"
          COM_MAX_SECTIONS_PER_PAGE: "25"
        run: python scripts/fetch_com_debug.py

      - name: Commit COM debug data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Collect COM debug activities"
          file_pattern: "data/com-debug.json data/com-activities.json"
