name: Collect BNCP News

on:
  workflow_dispatch:
  schedule:
    # Korea time 08:20 and 18:20 every day
    - cron: "20 23 * * *"
    - cron: "20 09 * * *"

permissions:
  contents: write

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect news
        run: node scripts/collect-news.mjs

      - name: Commit updated news data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update BNCP news data"
          file_pattern: "data/*.json"
