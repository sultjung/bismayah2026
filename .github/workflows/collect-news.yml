name: Collect BNCP News

on:
  workflow_dispatch:
  schedule:
    # Korea time 06:20 and 12:30 every day
    - cron: "20 21 * * *"
    - cron: "30 03 * * *"

permissions:
  contents: write

concurrency:
  group: collect-bncp-news
  cancel-in-progress: false

jobs:
  collect-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main before collecting
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Collect news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_SUMMARY_MODEL: ${{ vars.OPENAI_SUMMARY_MODEL || 'gpt-5.4-mini' }}
          NEWS_LOOKBACK_DAYS: "30"
          MAX_PER_QUERY: "20"
          MAX_TOTAL: "250"
        run: node scripts/collect-news.mjs

      - name: Sync latest main before commit
        run: |
          git config pull.rebase true
          git pull --rebase --autostash origin main

      - name: Commit updated news data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update BNCP news data"
          file_pattern: "data/*.json"
