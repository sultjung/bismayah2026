name: COM Activities Update

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: com-activities-update
  cancel-in-progress: false

jobs:
  update-com-activities:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
      COM_MAX_PAGES: "5"
      COM_MAX_SECTIONS_PER_PAGE: "22"
      COM_KEEP_RAW: "false"
      OPENAI_SLEEP_SECONDS: "3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync latest main before collecting
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect COM activities
        run: python scripts/fetch_com_activities.py

      - name: Sync latest main before commit
        run: |
          git config pull.rebase true
          git pull --rebase --autostash origin main

      - name: Commit COM activities data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update COM activities data"
          file_pattern: "data/com-activities.json data/com-debug.json"
