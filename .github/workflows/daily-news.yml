name: Daily Bismayah News Update

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedule uses UTC.
    # 23:00 UTC = 08:00 Korea Standard Time
    - cron: "0 23 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
      MAX_TRANSLATIONS_PER_RUN: "5"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest news and translate to Korean
        run: python scripts/fetch_news.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Bismayah news data with Korean translations"
          file_pattern: data/news.json
