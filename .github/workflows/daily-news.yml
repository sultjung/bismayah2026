name: Daily Bismayah News Update

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedule uses UTC.
    # 23:00 UTC = 06:20 Korea Standard Time
    - cron: "20 21 * * *"

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}

      # Fast daily mode
      FETCH_DAYS: "7"
      STRICT_RELEVANCE: "true"

      # RSS는 유지하되 무거운 HTML/site 검색은 OFF
      ENABLE_DIRECT_RSS: "true"
      ENABLE_RSS_INDEX: "true"
      ENABLE_HTML_PAGES: "false"
      ENABLE_SITE_GOOGLE_SEARCH: "false"
      ENABLE_COM_ACTIVITIES: "true"
      COM_MAX_PAGES: "7"
      COM_MAX_SECTIONS_PER_PAGE: "18"

      # 안정화 후 10으로 올려도 됩니다.
      MAX_TRANSLATIONS_PER_RUN: "12"
      TRANSLATION_BATCH_SIZE: "3"
      OPENAI_SLEEP_SECONDS: "5"

      MAX_ITEMS_PER_FEED: "25"
      MAX_HTML_LINKS_PER_PAGE: "15"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install chromium

      - name: Fetch latest news and translate to Korean
        run: python scripts/fetch_news.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Bismayah news data"
          file_pattern: data/news.json
